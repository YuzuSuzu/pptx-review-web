# =====================================================================
# pptx-reviewer 設定ファイル
# =====================================================================

# =====================================================================
# ログ設定
# =====================================================================
logging:
  # ログ保持日数（デフォルト: 7日）
  # 環境変数 LOG_RETENTION_DAYS でも上書き可能（環境変数が優先）
  retention_days: 7
  # ログ出力ディレクトリ（app.py からの相対パス）
  log_dir: logs

# =====================================================================
# Microsoft Teams 通知設定
# API 接続エラー（Error code: 401）発生時に指定の Webhook URL へ通知します。
# =====================================================================
teams:
  # 通知を有効にする場合は true に変更
  enabled: false
  # Teams の Incoming Webhook URL
  # 設定方法:
  #   1. Teams を開き、通知を受け取りたいチャンネル（自分専用チャンネル等）を選択
  #   2. チャンネル名の右クリックメニュー → 「コネクタ」→「Incoming Webhook」→「構成」
  #   3. 名前を入力して「作成」→ 表示された URL をコピーして下記に貼り付け
  webhook_url: ""

# =====================================================================
# API キー設定画面のパスワード保護
# =====================================================================
# ブラウザの「OPENAI KEY SETTING」ボタンから OPENAI_API_KEY を変更する際に
# 必要なパスワードを設定します。
# このパスワードが一致した場合のみ .env への書き込みが許可されます。
# 未設定（空文字列）の場合は機能が無効になります。
api_key_setting:
  password: ""
