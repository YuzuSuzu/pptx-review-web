# =====================================================================
# pptx-reviewer 設定ファイル
# =====================================================================

# =====================================================================
# ログ設定
# =====================================================================
logging:
  # ログ保持日数（デフォルト: 7日）
  # 環境変数 LOG_RETENTION_DAYS でも上書き可能（環境変数が優先）
  retention_days: 7
  # ログ出力ディレクトリ（app.py からの相対パス）
  log_dir: logs

# =====================================================================
# Microsoft Teams 通知設定
# API 接続エラー（Error code: 401）発生時に指定の Webhook URL へ通知します。
# =====================================================================
teams:
  # 通知を有効にする場合は true に変更
  enabled: false
  # Webhook の種類を指定（下記のどちらかを選ぶ）
  #   incoming_webhook : Teams の Incoming Webhook（IT ポリシーで禁止されている場合は使えない）
  #   power_automate   : Power Automate の「HTTP 要求を受信したとき」トリガー（推奨）
  webhook_type: "power_automate"
  # Webhook URL（webhook_type に合わせた URL を貼り付ける）
  webhook_url: ""

# =====================================================================
# レビュー設定
# =====================================================================
review:
  # 1 回の AI リクエストで処理するスライド枚数（デフォルト: 3）
  # 多いほどスライド間の整合性チェック精度が上がるが、
  # トークン上限（finish_reason=length）に達してエラーになる可能性が高まる。
  # 環境変数 REVIEW_CHUNK_SIZE でも上書き可能。
  chunk_size: 3

# =====================================================================
# API キー設定画面のパスワード保護
# =====================================================================
# ブラウザの「OPENAI KEY SETTING」ボタンから OPENAI_API_KEY を変更する際に
# 必要なパスワードを設定します。
# このパスワードが一致した場合のみ .env への書き込みが許可されます。
# 未設定（空文字列）の場合は機能が無効になります。
api_key_setting:
  password: ""
